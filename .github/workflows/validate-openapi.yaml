name: Validate OpenAPI

on:
  pull_request:
    paths:
      - 'stratum-apps/src/monitoring/**'
      - 'stratum-apps/src/bin/generate-openapi.rs'

jobs:
  validate-openapi:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@1.88

      - name: Generate fresh OpenAPI JSON
        working-directory: stratum-apps
        # The committed OpenAPI schema is the telemetry-enabled superset used by
        # downstream consumers such as sv2-ui. Apps built without
        # asic-rs-telemetry expose a narrower runtime schema at
        # /api-docs/openapi.json.
        run: cargo run --bin generate-openapi --features monitoring,asic-rs-telemetry > fresh.json

      - name: Check openapi.json exists
        run: |
          if [ ! -f stratum-apps/src/monitoring/openapi.json ]; then
            echo "No openapi.json committed - run: cargo run --bin generate-openapi --features monitoring,asic-rs-telemetry > stratum-apps/src/monitoring/openapi.json"
            exit 1
          fi

      - name: Verify openapi.json is up to date
        run: |
          diff -u stratum-apps/src/monitoring/openapi.json stratum-apps/fresh.json
