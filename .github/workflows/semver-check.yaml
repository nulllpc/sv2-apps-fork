name: Semver Check

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

jobs:
  semver-check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@1.88

      - name: Install capnp dependencies
        run: sudo apt-get install -y capnproto libcapnp-dev

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-registry-

      - name: Cache Cargo index
        uses: actions/cache@v4
        with:
          path: ~/.cargo/git
          key: ${{ runner.os }}-cargo-index-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-index-

      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y cmake

      # Install cargo-binstall so tool installs below use prebuilt binaries.
      - name: Install cargo-binstall
        uses: cargo-bins/cargo-binstall@v1.20.0
        with:
          version: "1.20.0"

      # Install cargo-semver-checks via cargo-binstall (no source build).
      # Keep quick-install disabled to only use upstream release artifacts.
      - name: Install cargo-semver-checks
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: cargo binstall --no-confirm --disable-telemetry --disable-strategies quick-install --locked cargo-semver-checks@0.44.0

      - name: Run semver checks for bitcoin-core-sv2
        working-directory: bitcoin-core-sv2
        run: cargo semver-checks

      - name: Run semver checks for stratum-apps workspace
        working-directory: stratum-apps
        run: cargo semver-checks --all-features

      - name: Run semver checks for pool applications workspace
        working-directory: pool-apps
        run: cargo semver-checks  --workspace --all-features

      - name: Run semver checks for miner applications workspace
        working-directory: miner-apps
        run: cargo semver-checks --workspace --all-features
